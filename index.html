<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take me</title>
    <link rel="stylesheet" href="lib/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="lib/bootstrap.min.css">
    <link rel="stylesheet" href="./style/login.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <button class="logo-btn"><img id="img" src="./img/logo.png" alt=""></button>
            <div class="navbar-nav">
                <a class="nav-link" href="./pages/about.html?type=no">אודות</a>
                <a class="nav-link" href="./pages/rishum.html?type=yes">רישום</a>
                <div class="header-left">
                </div>
            </div>
        </div>
    </nav>
<form>
        <div class="card" style="max-width: 360px;">
            <div class="card-body">
                <h3>כניסה למערכת</h3>
                <input name="nameUser" id="nameUser" class="form-control mb-2" placeholder="שם משתמש">
                <div class="password-wrap mb-3">
                    <input id="password" name="password" class="form-control" type="password" placeholder="סיסמה">
                    <span class="toggle-password" id="togglePassword">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" />
                        </svg>
                    </span>
                </div>
                <button id="enter" class="btn btn-primary w-100">התחברות</button>
                <div id="worng"></div>
            </div>
        </div>
    </form>


    <div id="allCard">
        <div id="numOfDriver"><h1>100 +</h1> נהגים</div>
        <div id="numOfPassenger"><h1>500 +</h1> נוסעים</div>
        <div id="numOfTraveler"><h1>652 +</h1>נסיעות</div>
    </div>

    <div class="features-row">
        <div class="a" id="a2">
            <span class="feature-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M13 2L4.5 13.5H11L10 22L19 10H12.5L13 2Z" fill="currentColor" />
                </svg>
            </span>
            <h1 class="a" id="a1">מהירות</h1>
            <p class="feature-text">מציאת נהג ואישור נסיעה תוך דקות ספורות, בכל שעה ובכל מקום.</p>
        </div>

        <div class="b" id="b2">
            <span class="feature-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" />
                    <path d="M12 7V12L15.5 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
            </span>
            <h1 class="b" id="b1">אמינות</h1>
            <p class="feature-text">רשת נהגים מאומתת ותהליך הזמנה בטוח ושקוף מתחילתו ועד סופו.</p>
        </div>

        <div class="c" id="c2">
            <span class="feature-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="4" y="9" width="16" height="11" rx="1.5" stroke="currentColor" stroke-width="2" />
                    <path d="M4 13H20" stroke="currentColor" stroke-width="2" />
                    <path d="M12 9V20" stroke="currentColor" stroke-width="2" />
                    <path d="M12 9C12 9 9.5 4 7 5C5 5.8 6.5 9 12 9Z" stroke="currentColor" stroke-width="2"
                        stroke-linejoin="round" />
                    <path d="M12 9C12 9 14.5 4 17 5C19 5.8 17.5 9 12 9Z" stroke="currentColor" stroke-width="2"
                        stroke-linejoin="round" />
                </svg>
            </span>
            <h1 class="c" id="c1">נוחות</h1>
            <p class="feature-text">ממשק פשוט וברור לנוסעים ולנהגים, בלי עלות הרשמה ובלי סיבוכים.</p>
        </div>
    </div>

    <div class="listAll">
        <div class="list" id="item1">
            <button class="question" id="quest1">
                <span class="question-text">איך נרשמים</span>
                <span class="question-arrow">&#9660;</span>
            </button>

            <div class="answer" id="answer1">
            </div>
        </div>

        <div class="list" id="item2">
            <button class="question" id="quest2">
                <span class="question-text">מהי העלות</span>
                <span class="question-arrow">&#9660;</span>
            </button>
            <div class="answer" id="answer2">
            </div>
        </div>

        <div class="list" id="item3">
            <button class="question" id="quest3">
                <span class="question-text">כמה זמן לוקח לנהג לתפוס נסיעה</span>
                <span class="question-arrow">&#9660;</span>
            </button>
            <div class="answer" id="answer3">
            </div>
        </div>

        <div class="list" id="item4">
            <button class="question" id="quest4">
                <span class="question-text">האם אפשר להיות כנוסע וכנהג על אותו שם משתמש</span>
                <span class="question-arrow">&#9660;</span>
            </button>
            <div class="answer" id="answer4">
            </div> 
        </div>
    </div>

<footer class="main-footer">TAKE ME © 2026</footer>
    <script src="scripts/data.js"></script>
    <script src="scripts/ls.js"></script>
    <script src="scripts/login.js"></script>

</body>

</html>
